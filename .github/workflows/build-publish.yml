name: Build

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: 0 0 * * *
      timezone: America/Los_Angeles
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x
      - name: Restore Tools
        run: dotnet tool restore
      - name: Restore Dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release
      - name: Test
        run: dotnet test -c Release --verbosity normal
        env:
          SNAPSHOOTER_STRICT_MODE: "true"
      - name: Pack
        run: dotnet pack -o nuget/
      - name: Get Version
        id: version
        run: |-
          VERSION=$(dotnet minver --tag-prefix v)
          echo Version is $VERSION
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v7
        with:
          path: nuget/*.nupkg
          archive: false
  publish:
    runs-on: ubuntu-latest
    # runs on tag pushes (real releases) or on a schedule or manually (prereleases)
    if: |-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || 
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch'
    needs:
      - build
    
    steps:
      - name: Download
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ needs.build.outputs.artifact-id }}
          path: nuget/
      - name: NuGet Login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Publish NuGet
        id: publish
        run: |-
          dotnet nuget push nuget/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json
        continue-on-error: true
      - name: Create Release
        if: steps.publish.outcome == 'success' && !contains(needs.build.outputs.version, '-')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          generate_release_notes: true
          tag_name: v${{ needs.build.outputs.version }}
